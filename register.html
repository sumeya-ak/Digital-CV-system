<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Digital CV System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card fade-in" style="max-width:520px;">
      <div class="auth-header">
        <div class="auth-logo">CV</div>
        <h1>Create Account</h1>
        <p>Join the Digital CV System</p>
      </div>
      <div class="auth-body">
        <div id="regAlert" class="alert alert-danger hidden">
          <span>&#9888;</span> <span id="regAlertMsg"></span>
        </div>
        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Select Role <span class="required">*</span></label>
            <div class="role-selector">
              <div class="role-option">
                <input type="radio" name="role" id="roleStudent" value="student" checked>
                <label for="roleStudent"><span class="role-icon">&#127891;</span> Student</label>
              </div>
              <div class="role-option">
                <input type="radio" name="role" id="roleRecruiter" value="recruiter">
                <label for="roleRecruiter"><span class="role-icon">&#128188;</span> HR/Recruiter</label>
              </div>
            </div>
            <p class="form-hint">Supervisor and Examiner roles require an invitation from the system manager.</p>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>First Name <span class="required">*</span></label>
              <input type="text" class="form-control" id="regFirstName" placeholder="First name" required>
            </div>
            <div class="form-group">
              <label>Last Name <span class="required">*</span></label>
              <input type="text" class="form-control" id="regLastName" placeholder="Last name" required>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address <span class="required">*</span></label>
            <input type="email" class="form-control" id="regEmail" placeholder="Enter your email" required>
          </div>
          <div class="form-group" id="institutionGroup">
            <label>Institution / Organization <span class="required">*</span></label>
            <input type="text" class="form-control" id="regInstitution" placeholder="University or company name">
          </div>
          <div class="form-group">
            <label>Password <span class="required">*</span></label>
            <input type="password" class="form-control" id="regPassword" placeholder="Create a password" required minlength="8">
            <p class="form-hint">Minimum 8 characters</p>
          </div>
          <div class="form-group">
            <label>Confirm Password <span class="required">*</span></label>
            <input type="password" class="form-control" id="regConfirmPassword" placeholder="Confirm your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
        </form>
      </div>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Check for invitation token
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    async function validateTokenAndLoad() {
      if (!token) return;

      try {
        const response = await fetch(`${API_BASE}/invitations.php?action=validate&token=${token}`);
        const data = await response.json();

        if (data.valid) {
          // Pre-fill email and lock it
          document.getElementById('regEmail').value = data.email;
          document.getElementById('regEmail').readOnly = true;

          // Hide role selector and show locked role
          const roleGroup = document.querySelector('.role-selector').parentElement;
          roleGroup.innerHTML = `
            <label>Account Type <span class="required">*</span></label>
            <div class="alert alert-info" style="margin-bottom:0;">
              <strong>${data.role.charAt(0).toUpperCase() + data.role.slice(1)}</strong> (Invitation-based registration)
            </div>
            <input type="hidden" name="role" id="regRole" value="${data.role}">
          `;

          // Show invitation notice
          const alert = document.getElementById('regAlert');
          alert.classList.remove('hidden', 'alert-danger');
          alert.classList.add('alert-success');
          document.getElementById('regAlertMsg').textContent = 'Valid invitation detected. Complete your registration below.';
        } else {
          // Invalid token
          const alert = document.getElementById('regAlert');
          alert.classList.remove('hidden', 'alert-danger');
          document.getElementById('regAlertMsg').textContent = data.error || 'Invalid invitation token';
          document.getElementById('registerForm').style.pointerEvents = 'none';
          document.getElementById('registerForm').style.opacity = '0.5';
        }
      } catch (err) {
        console.error('Token validation error:', err);
      }
    }

    // Override handleRegister to include token
    const originalHandleRegister = window.handleRegister;
    window.handleRegister = function(e) {
      e.preventDefault();
      const roleInput = document.getElementById('regRole');
      const role = roleInput ? roleInput.value : document.querySelector('input[name="role"]:checked')?.value;

      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      const firstName = document.getElementById('regFirstName').value.trim();
      const lastName = document.getElementById('regLastName').value.trim();
      const institution = document.getElementById('regInstitution').value.trim();

      if (!email || !password || !firstName || !lastName) {
        showAuthAlert('register', 'Please fill in all required fields.');
        return;
      }

      if (password !== confirmPassword) {
        showAuthAlert('register', 'Passwords do not match.');
        return;
      }

      if (password.length < 8) {
        showAuthAlert('register', 'Password must be at least 8 characters.');
        return;
      }

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const payload = {
        email,
        password,
        first_name: firstName,
        last_name: lastName,
        institution,
        role
      };

      if (token) {
        payload.token = token;
      }

      fetch(`${API_BASE}/auth.php?action=register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          showAuthAlert('register', data.error);
          btn.disabled = false;
          btn.textContent = 'Create Account';
        } else {
          localStorage.setItem('dcv_current_user', JSON.stringify(data.user));
          window.location.href = 'student-dashboard.html';
        }
      })
      .catch(err => {
        showAuthAlert('register', 'Registration failed. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      });
    };

    // Validate token on page load
    document.addEventListener('DOMContentLoaded', validateTokenAndLoad);
  </script>
</body>
</html>
