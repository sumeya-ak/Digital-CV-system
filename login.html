<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Digital CV System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card fade-in">
      <div class="auth-header">
        <div class="auth-logo">CV</div>
        <h1>Welcome Back</h1>
        <p>Sign in to access your Digital CV account</p>
      </div>
      <div class="auth-body">
        <div id="loginAlert" class="alert alert-danger hidden">
          <span>&#9888;</span> <span id="loginAlertMsg">Invalid credentials</span>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address <span class="required">*</span></label>
            <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label>Password <span class="required">*</span></label>
            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
          </div>
          <div class="d-flex justify-between align-center mb-2">
            <label style="display:flex;align-items:center;gap:0.35rem;font-size:0.82rem;color:var(--gray-600);cursor:pointer;">
              <input type="checkbox" id="rememberMe"> Remember me
            </label>
            <a href="#" style="font-size:0.82rem;">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
        </form>
      </div>
      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
